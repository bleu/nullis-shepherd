name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master 2026-03-27
        with:
          toolchain: "1.94"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master 2026-03-27
        with:
          toolchain: "1.94"
          components: clippy
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master 2026-03-27
        with:
          toolchain: "1.94"
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace --all-features --no-fail-fast

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master 2026-03-27
        with:
          toolchain: "1.94"
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo doc --workspace --no-deps

  build-module:
    name: build ${{ matrix.module }} (wasm32-wasip2)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - example
          - twap-monitor
          - ethflow-watcher
          - price-alert
          - balance-tracker
          - stop-loss
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master 2026-03-27
        with:
          toolchain: "1.94"
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build -p ${{ matrix.module }} --target wasm32-wasip2 --release
      - name: report wasm size
        run: |
          artifact_name=$(echo "${{ matrix.module }}" | tr '-' '_')
          wasm_path="target/wasm32-wasip2/release/${artifact_name}.wasm"
          if [ -f "$wasm_path" ]; then
            size=$(wc -c < "$wasm_path")
            echo "${{ matrix.module }} .wasm size: ${size} bytes"
          fi
