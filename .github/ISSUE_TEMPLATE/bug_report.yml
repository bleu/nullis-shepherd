name: Bug report
description: Report a defect or unexpected behavior in Shepherd.
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One- or two-sentence description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce. Include commands, module manifest, and host config if relevant.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include logs, stack traces, or `RUST_LOG=debug` output if available.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Shepherd version / commit
      placeholder: "e.g. 0.1.0 or a2f5b8c"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, Rust toolchain, wasmtime version if non-default"
  - type: textarea
    id: extra
    attributes:
      label: Additional context
