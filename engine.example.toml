# Engine-side runtime configuration for `nexum-engine`.
#
# Distinct from `nexum.toml` (per-module manifest): this file
# describes the *engine*'s I/O wiring. Copy to `engine.toml` next to
# the binary, or pass the path as the third positional argument.
#
# ## RPC scheme choice
#
# Every entry below uses `wss://`. The engine subscribes to blocks
# and logs via `eth_subscribe`, which is a **WebSocket-only** JSON-RPC
# method in the Ethereum protocol (HTTP transports return
# "subscriptions are not available on this provider"). Every paid
# provider (drpc, Alchemy, Infura, QuickNode) exposes both
# `https://...` and `wss://...` for the same endpoint — pick the WS
# form.
#
# If you have a chain that's consumed *only* by poll-style modules
# (request/response `chain::request`, no block / log subscriptions),
# set `require_ws = false` on that chain to silence the boot-time
# fail-fast check.

[engine]
# Directory the local-store redb file (and future engine artefacts)
# will be created under. Created automatically at boot.
state_dir = "./data"

# `tracing_subscriber::EnvFilter`-compatible directive. `RUST_LOG`
# overrides at process start.
log_level = "info"

# One [chains.<id>] table per chain the engine should be able to talk
# to. Chain ids are EVM decimal. Replace `<KEY>` placeholders with
# your paid endpoint's API key.

[chains.1]                                   # Ethereum Mainnet
rpc_url = "wss://eth-mainnet.g.alchemy.com/v2/<KEY>"

[chains.100]                                 # Gnosis Chain
rpc_url = "wss://gnosis-mainnet.g.alchemy.com/v2/<KEY>"

[chains.11155111]                            # Sepolia
rpc_url = "wss://eth-sepolia.g.alchemy.com/v2/<KEY>"

[chains.42161]                               # Arbitrum One
rpc_url = "wss://arb-mainnet.g.alchemy.com/v2/<KEY>"

[chains.8453]                                # Base
rpc_url = "wss://base-mainnet.g.alchemy.com/v2/<KEY>"
