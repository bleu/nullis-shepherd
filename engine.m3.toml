# M3 smoke / validation config for nexum-engine.
#
# Boots the 3 M3 example modules (price-alert + balance-tracker +
# stop-loss) against Sepolia. The 3 modules exercise the full SDK
# helper surface (chain::request via Chainlink read, local-store
# diffing, cow-api submit with PreSign).
#
# Usage:
#   just run-m3
#   # or:
#   cargo build -p price-alert     --target wasm32-wasip2 --release
#   cargo build -p balance-tracker --target wasm32-wasip2 --release
#   cargo build -p stop-loss       --target wasm32-wasip2 --release
#   cargo run   -p nexum-runtime -- --engine-config engine.m3.toml

[engine]
# Separate from data/m2 and the M1 example state.
state_dir = "./data/m3"
log_level = "info,nexum_runtime=debug"

# Sepolia. Override with an Alchemy / Infura WS for sustained runs;
# the public node throttles eth_subscribe under load.
[chains.11155111]
rpc_url = "wss://ethereum-sepolia-rpc.publicnode.com"

[[modules]]
path = "target/wasm32-wasip2/release/price_alert.wasm"
manifest = "modules/examples/price-alert/module.toml"

[[modules]]
path = "target/wasm32-wasip2/release/balance_tracker.wasm"
manifest = "modules/examples/balance-tracker/module.toml"

[[modules]]
path = "target/wasm32-wasip2/release/stop_loss.wasm"
manifest = "modules/examples/stop-loss/module.toml"
